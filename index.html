<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>REEL OS — One Perfect Clip</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#040406;--surface:#08080f;--card:#0c0c15;--border:#14141f;
  --accent:#FF3CAC;--a2:#784BA0;--a3:#2B86C5;
  --yellow:#FFE566;--green:#00E5A0;--red:#FF6B6B;
  --text:#EEEEF2;--muted:#44445a;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;
  background:radial-gradient(ellipse 60% 50% at 80% 0%,rgba(255,60,172,.07)0%,transparent 60%),
             radial-gradient(ellipse 50% 60% at 0% 100%,rgba(43,134,197,.05)0%,transparent 60%);
  pointer-events:none;z-index:0;}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:14px 28px;border-bottom:1px solid var(--border);
  background:rgba(4,4,6,.97);backdrop-filter:blur(20px);
  position:relative;z-index:10;flex-wrap:wrap;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:6px;}
.logo em{color:var(--accent);font-style:normal;}
.logo-sub{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);
  letter-spacing:3px;text-transform:uppercase;margin-top:3px;}
.hbadge{display:flex;align-items:center;gap:6px;border-radius:100px;padding:6px 14px;
  border:1px solid var(--border);font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);}
.hbadge.ok{background:rgba(0,229,160,.07);border-color:rgba(0,229,160,.2);color:var(--green);}
.hbadge.err{background:rgba(255,60,172,.07);border-color:rgba(255,60,172,.2);color:var(--red);}
.dot{width:6px;height:6px;border-radius:50%;background:currentColor;animation:blink 2s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* MAIN LAYOUT */
.wrap{max-width:1100px;margin:0 auto;padding:32px 28px;position:relative;z-index:1;}

/* AESTHETIC PICKER */
.section-label{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:3px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.section-label::after{content:'';flex:1;height:1px;background:var(--border);}

.aes-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:28px;}
.aes{background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:12px 10px;cursor:pointer;transition:all .18s;text-align:center;}
.aes:hover{border-color:#222230;}
.aes.on{border-color:var(--accent);background:rgba(255,60,172,.07);}
.aes-icon{font-size:22px;display:block;margin-bottom:6px;}
.aes-name{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:2px;color:var(--muted);}
.aes.on .aes-name{color:var(--accent);}

/* TOPIC ROW */
.topic-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:24px;}
.tp{background:var(--card);border:1px solid var(--border);border-radius:100px;
  padding:7px 14px;cursor:pointer;transition:all .18s;
  font-size:12px;color:var(--muted);display:flex;align-items:center;gap:6px;}
.tp:hover{border-color:#222230;}
.tp.on{background:rgba(255,60,172,.08);border-color:var(--accent);color:var(--text);}
.tp.today{border-color:rgba(255,229,102,.3);}
.tp.today::after{content:'today';font-family:'Space Mono',monospace;font-size:7px;
  background:var(--yellow);color:#000;border-radius:3px;padding:1px 5px;margin-left:2px;}

/* SETTINGS ROW */
.settings-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:24px;}
.fg label{display:block;font-family:'Space Mono',monospace;font-size:8px;
  text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:5px;}
.fg select,.fg input{width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-size:12px;padding:8px 11px;outline:none;
  font-family:'DM Sans',sans-serif;transition:border-color .2s;}
.fg select:focus,.fg input:focus{border-color:var(--accent);}

/* GEN BTN */
.gbtn{width:100%;background:linear-gradient(135deg,var(--accent),var(--a2));
  color:#fff;border:none;border-radius:11px;padding:15px;font-size:15px;font-weight:600;
  cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;
  display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px;
  letter-spacing:.3px;}
.gbtn:hover{transform:translateY(-2px);box-shadow:0 10px 32px rgba(255,60,172,.3);}
.gbtn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}

/* SCENARIO CARD */
.scenario{background:var(--card);border:1px solid var(--border);border-radius:14px;
  overflow:hidden;margin-bottom:28px;animation:fu .3s ease;}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.scenario-head{padding:18px 22px;border-bottom:1px solid var(--border);}
.scenario-aes{font-family:'Space Mono',monospace;font-size:9px;text-transform:uppercase;
  letter-spacing:3px;color:var(--accent);margin-bottom:8px;}
.scenario-world{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:2px;
  line-height:1;margin-bottom:8px;}
.scenario-desc{font-size:14px;color:var(--muted);line-height:1.7;max-width:600px;}
.scenario-meta{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;}
.smeta{font-family:'Space Mono',monospace;font-size:9px;padding:4px 10px;
  border-radius:100px;border:1px solid var(--border);color:var(--muted);}
.smeta.color{border-color:rgba(255,229,102,.3);color:var(--yellow);}
.smeta.light{border-color:rgba(43,134,197,.3);color:var(--a3);}
.smeta.motion{border-color:rgba(255,60,172,.3);color:var(--accent);}
.smeta.lens{border-color:rgba(0,229,160,.3);color:var(--green);}

/* CAPTION + CAPCUT */
.info-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px 22px;
  border-bottom:1px solid var(--border);}
.info-block label{font-family:'Space Mono',monospace;font-size:8px;text-transform:uppercase;
  letter-spacing:2px;color:var(--muted);display:block;margin-bottom:6px;}
.info-block p{font-size:12px;color:var(--text);line-height:1.7;}
.copy-inline{background:none;border:1px solid var(--border);border-radius:5px;
  color:var(--muted);padding:3px 8px;font-size:9px;cursor:pointer;
  font-family:'Space Mono',monospace;float:right;transition:all .2s;}
.copy-inline:hover{color:var(--text);}

/* 4 CLIP OPTIONS GRID */
.clips-label{padding:14px 22px 10px;font-family:'Space Mono',monospace;font-size:9px;
  text-transform:uppercase;letter-spacing:3px;color:var(--muted);
  display:flex;align-items:center;justify-content:space-between;}
.clips-count{color:var(--green);}
.clips-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px 16px;}
@media(min-width:700px){.clips-grid.many{grid-template-columns:repeat(3,1fr);}}
@media(min-width:1000px){.clips-grid.many{grid-template-columns:repeat(4,1fr);}}

/* CLIP CARD */
.clip-card{background:var(--surface);border:2px solid var(--border);border-radius:10px;
  overflow:hidden;cursor:pointer;transition:all .22s;position:relative;}
.clip-card:hover{border-color:rgba(255,60,172,.4);transform:translateY(-2px);}
.clip-card.selected{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent);}
.clip-card.loading{pointer-events:none;opacity:.6;}

.clip-thumb{position:relative;aspect-ratio:9/16;background:#000;overflow:hidden;}
.clip-thumb video,.clip-thumb img{width:100%;height:100%;object-fit:cover;display:block;}
.clip-overlay{position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;background:rgba(0,0,0,.3);
  opacity:0;transition:opacity .2s;}
.clip-card:hover .clip-overlay{opacity:1;}
.clip-play{width:48px;height:48px;background:rgba(0,0,0,.5);backdrop-filter:blur(8px);
  border:1px solid rgba(255,255,255,.2);border-radius:50%;display:flex;align-items:center;
  justify-content:center;font-size:18px;transition:all .2s;}
.clip-card:hover .clip-play{background:rgba(255,60,172,.5);}

.clip-num{position:absolute;top:8px;left:8px;font-family:'Bebas Neue',sans-serif;
  font-size:16px;letter-spacing:2px;color:#fff;
  background:rgba(0,0,0,.5);backdrop-filter:blur(6px);
  border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:2px 8px;}

.src-chip{position:absolute;bottom:8px;left:8px;font-family:'Space Mono',monospace;
  font-size:7px;text-transform:uppercase;letter-spacing:1px;padding:2px 6px;
  border-radius:4px;backdrop-filter:blur(6px);}
.src-chip.Pexels{background:rgba(5,191,113,.6);color:#fff;}
.src-chip.Pixabay{background:rgba(255,229,102,.7);color:#000;}
.selected-badge{position:absolute;top:8px;right:8px;
  background:var(--accent);color:#fff;font-family:'Space Mono',monospace;
  font-size:8px;letter-spacing:1px;text-transform:uppercase;
  border-radius:5px;padding:3px 8px;display:none;}
.clip-card.selected .selected-badge{display:block;}

.clip-info{padding:10px 12px;}
.clip-dur{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);
  display:flex;gap:8px;margin-bottom:4px;}
.clip-ph{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.q-badge{font-family:'Space Mono',monospace;font-size:8px;letter-spacing:1px;
  padding:2px 6px;border-radius:4px;font-weight:700;border:1px solid var(--border);}
.q-badge.uhd{background:rgba(255,60,172,.15);border-color:rgba(255,60,172,.4);color:var(--accent);}
.q-badge.hd{background:rgba(0,229,160,.1);border-color:rgba(0,229,160,.3);color:var(--green);}
.q-badge.sd{background:rgba(255,229,102,.08);border-color:rgba(255,229,102,.2);color:var(--yellow);}

/* SKELETON CLIP */
.clip-skeleton{aspect-ratio:9/16;
  background:linear-gradient(90deg,var(--card)25%,#0f0f1a 50%,var(--card)75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{0%{background-position:200%0}100%{background-position:-200%0}}

/* DOWNLOAD SECTION */
.dl-section{padding:16px 22px;display:flex;align-items:center;gap:12px;
  border-top:1px solid var(--border);flex-wrap:wrap;}
.dl-btn{display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--accent),var(--a2));
  color:#fff;border:none;border-radius:9px;padding:12px 22px;font-size:13px;
  font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;text-decoration:none;}
.dl-btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(255,60,172,.3);}
.dl-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none;}
.view-btn{display:flex;align-items:center;gap:6px;background:none;
  border:1px solid var(--border);border-radius:9px;padding:12px 18px;
  font-size:12px;color:var(--muted);cursor:pointer;font-family:'DM Sans',sans-serif;
  transition:all .2s;text-decoration:none;}
.view-btn:hover{color:var(--text);border-color:#333;}
.regen-btn{margin-left:auto;background:none;border:1px solid var(--border);
  border-radius:9px;padding:10px 16px;font-size:11px;color:var(--muted);
  cursor:pointer;font-family:'Space Mono',monospace;transition:all .2s;}
.regen-btn:hover{color:var(--text);border-color:#333;}

/* LOADING */
.lwrap{text-align:center;padding:48px 20px;}
.lring{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ltxt{font-family:'Space Mono',monospace;font-size:11px;letter-spacing:2px;
  color:var(--muted);margin-bottom:16px;text-transform:uppercase;}
.lstep{font-size:12px;color:var(--muted);margin-top:8px;transition:color .3s;}
.lstep.act{color:var(--accent);} .lstep.ok{color:var(--green);}

/* EMPTY */
.empty{text-align:center;padding:64px 20px;color:var(--muted);}
.empty-icon{font-size:52px;opacity:.1;display:block;margin-bottom:16px;}
.empty-t{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:2px;
  opacity:.15;color:var(--text);margin-bottom:8px;}
.empty-s{font-size:12px;line-height:1.8;opacity:.4;}

/* ERROR */
.err{display:none;background:rgba(255,60,172,.07);border:1px solid rgba(255,60,172,.2);
  border-radius:9px;padding:12px 16px;margin-bottom:20px;font-size:12px;color:#ff8aaa;line-height:1.6;}
.err.show{display:block;}
.err b{color:var(--accent);display:block;margin-bottom:3px;
  font-family:'Space Mono',monospace;font-size:9px;letter-spacing:1px;}

::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}
@media(max-width:700px){
  .aes-grid{grid-template-columns:repeat(4,1fr);}
  .settings-row{grid-template-columns:1fr 1fr;}
  .clips-grid{grid-template-columns:repeat(2,1fr);}
  .info-row{grid-template-columns:1fr;}
  .wrap{padding:20px 16px;}
  header{padding:12px 16px;}
}
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">REEL<em>OS</em></div>
    <div class="logo-sub">One Perfect Clip</div>
  </div>
  <div class="hbadge" id="badge"><div class="dot"></div><span id="badgeTxt">Checking…</span></div>
</header>

<div class="wrap">

  <div class="err" id="errBox"><b>⚠️ Error</b><span id="errMsg"></span></div>

  <!-- AESTHETIC -->
  <div class="section-label">Aesthetic World</div>
  <div class="aes-grid">
    <div class="aes on" onclick="selAes(this,'cyberpunk')"><span class="aes-icon">🌆</span><div class="aes-name">Cyberpunk</div></div>
    <div class="aes" onclick="selAes(this,'dark luxury')"><span class="aes-icon">🖤</span><div class="aes-name">Dark Luxury</div></div>
    <div class="aes" onclick="selAes(this,'film noir')"><span class="aes-icon">🎞</span><div class="aes-name">Film Noir</div></div>
    <div class="aes" onclick="selAes(this,'golden hour')"><span class="aes-icon">🌅</span><div class="aes-name">Golden Hour</div></div>
    <div class="aes" onclick="selAes(this,'underground')"><span class="aes-icon">🎵</span><div class="aes-name">Underground</div></div>
    <div class="aes" onclick="selAes(this,'street grit')"><span class="aes-icon">🏙</span><div class="aes-name">Street Grit</div></div>
    <div class="aes" onclick="selAes(this,'minimal void')"><span class="aes-icon">⬛</span><div class="aes-name">Minimal Void</div></div>
    <div class="aes" onclick="selAes(this,'retro wave')"><span class="aes-icon">📼</span><div class="aes-name">Retro Wave</div></div>
  </div>

  <!-- TOPIC -->
  <div class="section-label">Topic</div>
  <div class="topic-row" id="topicRow">
    <div class="tp" onclick="pick(this,'Urban Life','🌆')"><span>🌆</span> Urban</div>
    <div class="tp" onclick="pick(this,'Fashion','👗')"><span>👗</span> Fashion</div>
    <div class="tp" onclick="pick(this,'Music','🎵')"><span>🎵</span> Music</div>
    <div class="tp" onclick="pick(this,'Nightlife','🌙')"><span>🌙</span> Nightlife</div>
    <div class="tp" onclick="pick(this,'Aesthetic','🎨')"><span>🎨</span> Aesthetic</div>
    <div class="tp" onclick="pick(this,'Street Art','🖼')"><span>🖼</span> Street Art</div>
    <div class="tp" onclick="pick(this,'Architecture','🏙')"><span>🏙</span> Arch.</div>
    <div class="tp" onclick="pick(this,'Subculture','🎭')"><span>🎭</span> Culture</div>
    <div class="tp" onclick="pick(this,'Travel','✈️')"><span>✈️</span> Travel</div>
    <div class="tp" onclick="pick(this,'Food','🍜')"><span>🍜</span> Food</div>
  </div>

  <!-- SETTINGS -->
  <div class="section-label">Settings</div>
  <div class="settings-row">
    <div class="fg"><label>Platform</label>
      <select id="plat"><option>Instagram Reels</option><option>TikTok</option><option>YouTube Shorts</option></select>
    </div>
    <div class="fg"><label>Your Niche</label>
      <input type="text" id="niche" value="Urban Fashion" placeholder="streetwear, nightlife…">
    </div>
    <div class="fg"><label>City / Location</label>
      <input type="text" id="city" placeholder="Tokyo, London, NYC…">
    </div>
    <div class="fg"><label>Mood Word</label>
      <input type="text" id="mood" placeholder="e.g. lost, free, raw…">
    </div>
  </div>
  <div class="settings-row" style="grid-template-columns:1fr 1fr 1fr;margin-bottom:24px;">
    <div class="fg">
      <label>Min Clip Length</label>
      <select id="minDur">
        <option value="0">Any length</option>
        <option value="15">15 sec+</option>
        <option value="30" selected>30 sec+</option>
        <option value="45">45 sec+</option>
        <option value="60">60 sec+</option>
      </select>
    </div>
    <div class="fg">
      <label>Max Clip Length</label>
      <select id="maxDur">
        <option value="0">Any length</option>
        <option value="30">Up to 30 sec</option>
        <option value="60" selected>Up to 60 sec</option>
        <option value="90">Up to 90 sec</option>
        <option value="120">Up to 2 min</option>
      </select>
    </div>
    <div class="fg">
      <label>Results to Show</label>
      <select id="clipCount">
        <option value="4">4 clips</option>
        <option value="8" selected>8 clips</option>
        <option value="12">12 clips</option>
      </select>
    </div>
  </div>

  <button class="gbtn" id="gbtn" onclick="generate()">
    <span>🎬</span> Find My Clip
  </button>

  <!-- OUTPUT -->
  <div id="output"></div>

</div>

<script>
const API = window.location.origin;

// ── Aesthetic definitions ──────────────────────────────────
const AESTHETICS = {
  'cyberpunk':    { icon:'🌆', name:'Cyberpunk',    color:'teal neon', light:'rain reflections backlit', motion:'slow motion', searchBase:'neon rain city night reflections' },
  'dark luxury':  { icon:'🖤', name:'Dark Luxury',  color:'black gold', light:'single spotlight dark', motion:'extreme slow motion', searchBase:'dark luxury moody cinematic' },
  'film noir':    { icon:'🎞', name:'Film Noir',    color:'black white grain', light:'shadows harsh contrast', motion:'static or slow', searchBase:'noir shadows smoke street grain' },
  'golden hour':  { icon:'🌅', name:'Golden Hour',  color:'warm amber gold', light:'sun flare backlit', motion:'slow motion', searchBase:'golden hour warm light bokeh' },
  'underground':  { icon:'🎵', name:'Underground',  color:'strobe neon', light:'club dark flash', motion:'crowd energy', searchBase:'underground club dark crowd neon' },
  'street grit':  { icon:'🏙', name:'Street Grit',  color:'desaturated grain', light:'overcast flat neon', motion:'handheld raw', searchBase:'gritty urban street raw night' },
  'minimal void': { icon:'⬛', name:'Minimal Void', color:'pure black void', light:'single beam', motion:'very slow', searchBase:'minimal dark void architecture shadow' },
  'retro wave':   { icon:'📼', name:'Retro Wave',   color:'purple pink neon', light:'grid synthwave', motion:'slow pan', searchBase:'synthwave neon retro 80s purple' },
};

// ── Topics ─────────────────────────────────────────────────
const TOPICS = [
  'Urban Life','Fashion','Music','Nightlife','Aesthetic',
  'Street Art','Architecture','Subculture','Travel','Food'
];

let aesKey   = 'cyberpunk';
let topicName = 'Urban Life';
let selectedClip = null;

// Daily topic
const dayOfYear = Math.floor((Date.now()-new Date(new Date().getFullYear(),0,0))/86400000);
const dailyTopic = TOPICS[dayOfYear % TOPICS.length];
document.querySelectorAll('.tp').forEach((el,i)=>{
  if(TOPICS[i]===dailyTopic){
    el.classList.add('on','today');
    topicName = dailyTopic;
  }
});

function selAes(el, key){
  document.querySelectorAll('.aes').forEach(a=>a.classList.remove('on'));
  el.classList.add('on'); aesKey=key;
}
function pick(el, name){
  document.querySelectorAll('.tp').forEach(t=>t.classList.remove('on'));
  el.classList.add('on'); topicName=name;
}

// ── Health ─────────────────────────────────────────────────
async function checkHealth(){
  try{
    const d=await fetch(`${API}/health`).then(r=>r.json());
    const ok=d.ai_provider==='claude'?d.claude:d.groq;
    const prov=(d.ai_provider||'groq').toUpperCase();
    const badge=document.getElementById('badge');
    if(d.pexels&&ok){ badge.className='hbadge ok'; document.getElementById('badgeTxt').textContent=`${prov} + Pexels ✓`; }
    else { badge.className='hbadge err'; document.getElementById('badgeTxt').textContent=`Missing keys`; }
  }catch{ document.getElementById('badge').className='hbadge err'; document.getElementById('badgeTxt').textContent='Server offline'; }
}
checkHealth();

// ── Loading steps ──────────────────────────────────────────
let stmr;
function showLoading(msg){
  const out=document.getElementById('output');
  out.innerHTML=`
    <div class="lwrap">
      <div class="lring"></div>
      <div class="ltxt">${msg}</div>
      <div id="s1" class="lstep">🎬 Crafting the perfect scenario…</div>
      <div id="s2" class="lstep">🔍 Searching Pexels with 4 specific queries…</div>
      <div id="s3" class="lstep">🎯 Picking best matching clips…</div>
    </div>`;
  let i=0; const ids=['s1','s2','s3'];
  ids.forEach(id=>{ const el=document.getElementById(id); if(el) el.className='lstep'; });
  stmr=setInterval(()=>{
    const prev=ids[i-1],curr=ids[i];
    if(prev){ const el=document.getElementById(prev); if(el) el.className='lstep ok'; }
    if(curr){ const el=document.getElementById(curr); if(el) el.className='lstep act'; i++; }
    else clearInterval(stmr);
  },1000);
}

// ── AI call ────────────────────────────────────────────────
async function callAI(prompt){
  const r=await fetch(`${API}/api/ai`,{
    method:'POST', headers:{'Content-Type':'application/json'},
    body:JSON.stringify({
      max_tokens:1200,
      system:'You are a cinematic Instagram video curator. Respond ONLY with valid JSON. No markdown, no backticks, no extra text.',
      messages:[{role:'user',content:prompt}]
    })
  });
  const d=await r.json();
  if(d.error) throw new Error(typeof d.error==='string'?d.error:(d.error.message||JSON.stringify(d.error)));
  const raw=(d.content?.[0]?.text||'{}').replace(/```json|```/g,'').trim();
  try{return JSON.parse(raw);}
  catch(e){throw new Error('Bad JSON: '+raw.slice(0,120));}
}

// ── Search videos via server (Pexels + Pixabay) ───────────
async function searchVideos(query, minDur, maxDur, page) {
  const params = new URLSearchParams({
    q:      query,
    n:      '15',
    minDur: minDur || '0',
    maxDur: maxDur || '0',
  });
  if (page) params.set('page', page);
  const r = await fetch(`${API}/api/videos?${params}`);
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return d.videos || [];
}

// ── MAIN GENERATE ──────────────────────────────────────────
async function generate(){
  hideErr();
  selectedClip = null;
  const aes      = AESTHETICS[aesKey];
  const niche    = document.getElementById('niche').value    || 'Urban Fashion';
  const city     = document.getElementById('city').value     || '';
  const mood     = document.getElementById('mood').value     || '';
  const plat     = document.getElementById('plat').value;
  const minDur   = parseInt(document.getElementById('minDur').value)   || 0;
  const maxDur   = parseInt(document.getElementById('maxDur').value)   || 0;
  const clipCount= parseInt(document.getElementById('clipCount').value) || 8;

  document.getElementById('gbtn').disabled = true;
  showLoading(`Finding the perfect ${aes.name} clip…`);

  try {
    // ── Step 1: AI generates scenario + 6 search queries ──
    const data = await callAI(`
You are curating a cinematic single-clip Instagram Reel in ${aes.name} aesthetic.
Think: teemu.jpeg, 777salty — dark aesthetic pages that post ONE perfect cinematic clip per post.

AESTHETIC: ${aes.name}
VISUAL STYLE: ${aes.color} tones, ${aes.light} lighting, ${aes.motion} motion
TOPIC: ${topicName}
NICHE/BRAND: ${niche}
LOCATION HINT: ${city || 'urban city'}
MOOD WORD: ${mood || 'cinematic'}
PLATFORM: ${plat}
CLIP DURATION: ${minDur ? minDur+'s minimum' : 'any'} ${maxDur ? 'up to '+maxDur+'s' : ''}

Generate ONE specific cinematic scenario — a single place/moment.
Then generate 6 DIFFERENT ultra-specific search queries for this scenario.
Each query approaches the same place from a different angle, element, or composition.

Return ONLY this JSON:
{
  "scenarioTitle": "3-5 word evocative title (e.g. 'Neon Rain Empty Street')",
  "scenarioDesc":  "2 sentences — what the viewer sees and feels",
  "color":         "color grade",
  "light":         "lighting",
  "motion":        "camera motion",
  "lens":          "shot type",
  "caption":       "Instagram caption — short, poetic. Max 3 hashtags.",
  "captionAlt":    "alternative caption",
  "capcut":        "One CapCut tip: speed ramp, color grade, or effect",
  "queries": [
    "ultra specific query 1",
    "ultra specific query 2 — different angle",
    "ultra specific query 3 — different element",
    "ultra specific query 4 — wider shot",
    "ultra specific query 5 — closer detail",
    "ultra specific query 6 — mood/atmosphere focus"
  ]
}

Rules:
- All 6 queries relate to the SAME scenario
- Ultra specific — never generic (not 'person walking at night' or 'city street')
- Based on: ${aes.searchBase}${city ? ' ' + city : ''}${mood ? ' ' + mood : ''}`);

    clearInterval(stmr);

    // ── Step 2: Search all queries in parallel ─────────────
    const queries = data.queries || [];
    const searches = await Promise.all(
      queries.map(q => searchVideos(q, minDur, maxDur).catch(() => []))
    );

    // Flatten + deduplicate
    const seen = new Set();
    let allClips = searches.flat().filter(v => {
      if (!v.file || seen.has(v.id)) return false;
      seen.add(v.id); return true;
    });

    // If still not enough, broaden with fallback searches
    if (allClips.length < clipCount) {
      const fallbacks = [
        aes.searchBase + (city ? ' ' + city : ''),
        aes.searchBase + ' slow motion',
        topicName.toLowerCase() + ' ' + aes.searchBase,
      ];
      for (const fb of fallbacks) {
        if (allClips.length >= clipCount) break;
        const extra = await searchVideos(fb, minDur, maxDur).catch(() => []);
        extra.filter(v => v.file && !seen.has(v.id)).forEach(v => {
          seen.add(v.id); allClips.push(v);
        });
      }
    }

    // Score and slice to requested count
    allClips = allClips
      .sort((a, b) => scoreClip(b, minDur, maxDur) - scoreClip(a, minDur, maxDur))
      .slice(0, clipCount);

    renderResult(data, allClips, aes, minDur, maxDur);

  } catch(e) {
    clearInterval(stmr);
    console.error(e);
    showErr(e.message || 'Something went wrong');
    document.getElementById('output').innerHTML = '';
  } finally {
    document.getElementById('gbtn').disabled = false;
  }
}

// ── Score clip ─────────────────────────────────────────────
function scoreClip(v, minDur, maxDur) {
  let s = 0;
  const d = v.duration || 0;
  // Duration — highest weight
  if (minDur && maxDur && d >= minDur && d <= maxDur) s += 10;
  else if (minDur && d >= minDur) s += 6;
  else if (maxDur && d <= maxDur) s += 4;
  else if (d >= 30 && d <= 60) s += 5;  // default sweet spot
  else if (d < 10) s -= 4;
  // Quality
  if (v.fileWidth >= 3840) s += 5;
  else if (v.fileWidth >= 1920) s += 3;
  else if (v.fileWidth >= 1280) s += 1;
  // Portrait
  if (v.h > v.w) s += 3;
  // Has file
  if (v.file) s += 2;
  return s;
}

// ── RENDER ─────────────────────────────────────────────────
function renderResult(data, clips, aes, minDur, maxDur){
  const out = document.getElementById('output');

  const many = clips.length > 4;
  const clipsHTML = clips.length ? clips.map((v,i)=>`
    <div class="clip-card" id="clip${i}" onclick="selectClip(${i})">
      <div class="clip-thumb">
        <video id="cvid${i}" src="${v.file||''}" poster="${v.thumb||''}"
               loop muted playsinline preload="metadata"
               style="width:100%;height:100%;object-fit:cover;"></video>
        <div class="clip-overlay">
          <div class="clip-play" onclick="toggleVid(event,${i})">▶</div>
        </div>
        <div class="clip-num">${i+1}</div>
        <span class="src-chip ${v.source||'Pexels'}">${v.source||'Pexels'}</span>
        <div class="selected-badge">SELECTED</div>
      </div>
      <div class="clip-info">
        <div class="clip-dur">
          <span>⏱ ${v.duration}s</span>
          <span>📐 ${v.h>v.w?'9:16 ✓':'16:9'}</span>
          <span class="q-badge ${(v.quality||"").startsWith("4K")?"uhd":(v.quality||"").startsWith("HD")?"hd":"sd"}">${v.quality||"SD"}</span>
        </div>
        <div class="clip-ph">📸 ${v.photographer||'Pexels'} · ${v.fileWidth||v.w||"?"}px</div>
      </div>
    </div>`).join('') : `<div style="padding:20px;color:var(--muted);font-size:12px;">
      No clips found. Try a different aesthetic or topic.
    </div>`;

  out.innerHTML=`
    <div class="scenario">
      <div class="scenario-head">
        <div class="scenario-aes">${aes.icon} ${aes.name} Aesthetic</div>
        <div class="scenario-world">${data.scenarioTitle||'Cinematic Moment'}</div>
        <div class="scenario-desc">${data.scenarioDesc||''}</div>
        <div class="scenario-meta">
          <span class="smeta color">🎨 ${data.color||aes.color}</span>
          <span class="smeta light">💡 ${data.light||aes.light}</span>
          <span class="smeta motion">🎬 ${data.motion||aes.motion}</span>
          <span class="smeta lens">📷 ${data.lens||''}</span>
        </div>
      </div>

      <div class="info-row">
        <div class="info-block">
          <label>Caption <button class="copy-inline" onclick="cpText('${escQ(data.caption||'')}',this)">copy</button></label>
          <p>${data.caption||''}</p>
          <p style="margin-top:8px;opacity:.6;font-size:11px;">${data.captionAlt||''}</p>
        </div>
        <div class="info-block">
          <label>✂️ CapCut Tip</label>
          <p>${data.capcut||'Import → trim to best 10s → add color grade matching the aesthetic'}</p>
        </div>
      </div>

      <div class="clips-label">
        <span>Pick Your Clip — ${clips.length} Options ${minDur||maxDur ? '· '+[minDur&&minDur+'s min',maxDur&&'up to '+maxDur+'s'].filter(Boolean).join(' ') : ''}</span>
        <span class="clips-count">${clips.length} found</span>
      </div>
      <div class="clips-grid ${many?'many':''}">${clipsHTML}</div>

      <div class="dl-section" id="dlSection">
        <button class="dl-btn" id="dlBtn" onclick="downloadSelected()" disabled>
          ↓ Download Selected Clip
        </button>
        <button class="view-btn" id="viewBtn" onclick="viewOnPexels()" disabled>
          ↗ View on Pexels
        </button>
        <button class="regen-btn" onclick="generate()">🔄 New Options</button>
      </div>
    </div>`;

  // Store clip data for download
  window._clips = clips;
}

// ── Clip selection ─────────────────────────────────────────
function selectClip(i){
  document.querySelectorAll('.clip-card').forEach(c=>c.classList.remove('selected'));
  document.getElementById('clip'+i)?.classList.add('selected');
  selectedClip=i;
  const dlBtn=document.getElementById('dlBtn');
  const viewBtn=document.getElementById('viewBtn');
  if(dlBtn) dlBtn.disabled=false;
  if(viewBtn) viewBtn.disabled=false;
}

function toggleVid(e, i){
  e.stopPropagation();
  const v=document.getElementById('cvid'+i);
  if(!v) return;
  if(v.paused){ v.play(); e.currentTarget.textContent='⏸'; }
  else { v.pause(); e.currentTarget.textContent='▶'; }
  selectClip(i);
}

function downloadSelected(){
  if(selectedClip===null||!window._clips) return;
  const clip=window._clips[selectedClip];
  if(!clip?.file) return;
  const a=document.createElement('a');
  a.href=clip.file; a.download=`reelos-clip-${Date.now()}.mp4`; a.click();
}

function viewOnPexels(){
  if(selectedClip===null||!window._clips) return;
  const clip=window._clips[selectedClip];
  if(clip?.url) window.open(clip.url,'_blank');
}

// ── Utils ──────────────────────────────────────────────────
function escQ(s){ return (s||'').replace(/'/g,"\\'").replace(/\n/g,' '); }
function cpText(txt,btn){
  navigator.clipboard.writeText(txt.replace(/\\'/g,"'"));
  btn.textContent='done!'; setTimeout(()=>btn.textContent='copy',1200);
}
function showErr(msg){document.getElementById('errMsg').textContent=msg;document.getElementById('errBox').className='err show';}
function hideErr(){document.getElementById('errBox').className='err';}
</script>
